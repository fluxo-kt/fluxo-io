name: Validate Workflows

on:
  push:
    paths:
      - '.github/actions/**.yml'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/actions/**.yml'
      - '.github/workflows/*.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate local action metadata
        run: |
          ruby -e '
            require "yaml"
            Dir[".github/actions/*/action.yml"].sort.each do |path|
              action = YAML.load_file(path)
              abort("#{path}: missing name") unless action["name"].is_a?(String)
              abort("#{path}: missing runs") unless action["runs"].is_a?(Hash)
            end
          '

      - uses: ./.github/actions/actionlint
