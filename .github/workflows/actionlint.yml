name: Validate Workflows

on:
  push:
    paths:
      - '.github/actions/**.yml'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/actions/**.yml'
      - '.github/workflows/*.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate local action metadata
        run: |
          ruby -e '
            require "yaml"
            Dir[".github/actions/*/action.yml"].sort.each do |path|
              action = YAML.load_file(path)
              abort("#{path}: missing name") unless action["name"].is_a?(String)
              abort("#{path}: missing runs") unless action["runs"].is_a?(Hash)
            end
          '

      - uses: ./.github/actions/actionlint
