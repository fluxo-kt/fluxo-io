name: Build

on:
  pull_request:
  push:

permissions:
  contents: read
  # required for all workflows (CodeQL)
  security-events: write
  # required for workflows in private repositories (CodeQL)
  actions: read

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  #GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  IS_DEFAULT_REPO: ${{ github.repository == 'fluxo-kt/fluxo-io' }}
  IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
  GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  buildAndCheck:
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-24.04', 'macos-15', 'windows-2025' ]
        # CodeQL supports ['c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift']
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support.
        language: [ 'java-kotlin' ]

    name: 'Check ${{ matrix.os }}, JDK 21'
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    env:
      GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle with encrypted cache
        if: env.GRADLE_ENCRYPTION_KEY != ''
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: ${{ matrix.os == 'windows-2025' }} # super slow on Windows.
          cache-encryption-key: ${{ env.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ env.IS_DEFAULT_BRANCH != 'true' }}
          add-job-summary-as-pr-comment: never
          artifact-retention-days: 1
          validate-wrappers: true

      - name: Setup Gradle without encrypted cache
        if: env.GRADLE_ENCRYPTION_KEY == ''
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: ${{ matrix.os == 'windows-2025' }} # super slow on Windows.
          cache-read-only: ${{ env.IS_DEFAULT_BRANCH != 'true' }}
          add-job-summary-as-pr-comment: never
          artifact-retention-days: 1
          validate-wrappers: true

      # TODO: If it's a "build(deps): ..." commit, then run the dependency review actions,
      #  amend the `dependencyGuardBaseline` and `kotlinUpgradeYarnLock` task results

      - name: Initialize CodeQL
        if: matrix.os == 'ubuntu-24.04'
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list with "+" to use these queries, and those in the config file.
          #
          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended, security-and-quality.

      - name: 'Build and check'
        id: check
        timeout-minutes: 18
        run: ./gradlew build assemble check koverLog --continue --stacktrace --scan

      - name: Upload sarif report (Detekt)
        if: always() && matrix.os == 'macos-15'
          && (github.event_name == 'pull_request' || env.IS_DEFAULT_BRANCH == 'true')
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        continue-on-error: true
        with:
          sarif_file: build/detekt-merged.sarif
          category: detekt

      - name: Upload sarif report (Lint)
        if: always() && matrix.os == 'macos-15'
          && (github.event_name == 'pull_request' || env.IS_DEFAULT_BRANCH == 'true')
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        continue-on-error: true
        with:
          sarif_file: build/lint-merged.sarif
          category: lint

      - name: Upload test results to Codecov
        continue-on-error: true
        if: (success() && !cancelled())
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        env:
          OS: ${{ matrix.os }}
          JAVA_VERSION: 21
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/test-results/*/TEST-*.xml'
          env_vars: OS,JAVA_VERSION
          flags: '${{ matrix.os }}'
          name: 'codecov-${{ matrix.os }}-21'
          fail_ci_if_error: false
          verbose: true

      - name: Upload code coverage to Codecov
        continue-on-error: true
        if: success() || failure()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        env:
          OS: ${{ matrix.os }}
          JAVA_VERSION: 21
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/kover-merged-report.xml
          env_vars: OS,JAVA_VERSION
          flags: '${{ matrix.os }}'
          name: 'codecov-${{ matrix.os }}-21'
          fail_ci_if_error: false
          verbose: true

      - name: Upload the build report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: '${{ matrix.os }}-JDK21-build-report'
          path: |
            **/build/logs/
            **/build/reports/
            **/build/output/
            build/*-merged.*
          compression-level: 9

      - name: Perform CodeQL Analysis
        if: matrix.os == 'ubuntu-24.04'
        timeout-minutes: 6
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false
        with:
          category: "/language:${{matrix.language}}"

  publishSnapshot:
    needs: buildAndCheck
    runs-on: macos-15
    if: github.event_name == 'push'
      && github.repository == 'fluxo-kt/fluxo-io'
      && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      GITHUB_DEPENDENCY_GRAPH_ENABLED: false
      RELEASE: true

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true
          artifact-retention-days: 1
          validate-wrappers: true

      - name: Read project version
        id: project_version
        run: |
          version="$(awk -F ' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' gradle/libs.versions.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_snapshot=$([[ "$version" == *-SNAPSHOT ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Prepare SNAPSHOT publication artifacts
        if: steps.project_version.outputs.is_snapshot == 'true'
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishToMavenLocal --no-configuration-cache --stacktrace --scan

      - name: Collect SNAPSHOT attestation subjects
        id: snapshot_attestation_subjects
        if: steps.project_version.outputs.is_snapshot == 'true'
        uses: ./.github/actions/central-attestation-subjects
        with:
          project-version: ${{ steps.project_version.outputs.version }}
          require-signatures: true

      - name: Attest SNAPSHOT artifacts
        if: steps.project_version.outputs.is_snapshot == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ${{ steps.snapshot_attestation_subjects.outputs.checksums }}

      - name: Publish SNAPSHOT
        if: steps.project_version.outputs.is_snapshot == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache --stacktrace --scan
