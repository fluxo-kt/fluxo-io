name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # jsdiff DoS (CVE-2026-24001, LOW) in diff@7.0.0 — a Kotlin/JS *build-toolchain*
          # transitive (mocha/kotlin-web-helpers) in .kotlin-js-store/yarn.lock, never shipped in
          # the published artifact. GitHub mis-scopes every yarn.lock dep as `runtime` (so
          # fail-on-scopes can't help), and diff is semver-major-pinned (^7.0.0) below the 8.0.3
          # fix, so it can't be bumped out. Pre-existing on dev (diff@5.2.0 carries the same GHSA);
          # this branch shuffles one vulnerable version to another, adding no consumer-facing risk.
          # Strictness is preserved for shipped (JVM/actions) ecosystems — only this GHSA is waived.
          allow-ghsas: GHSA-73rr-hh4g-fpgx
