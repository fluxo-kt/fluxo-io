name: Dependency Submission

on:
  push:
    branches:
      - dev
  workflow_dispatch:
  schedule:
    - cron: '21 4 * * 1'

permissions:
  contents: write

env:
  CI: true
  # Allowlist only consumer-facing resolved classpaths. Matched full-string
  # (Java String.matches) against configuration names: includes jvm/js/wasmJs/
  # android* {Compile,Runtime}Classpath, excludes the buildscript `classpath`
  # (AGP/protobuf/bouncycastle build tooling) and `kotlinCompilerClasspath`.
  # A denylist (`^(?!(classpath)).*`) failed: project-qualified names like
  # `:classpath` don't start with the literal, so build tooling leaked into the
  # submitted graph and triggered phantom `security_update_dependency_not_found`.
  DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: ".*(Compile|Runtime)Classpath"
  DEPENDENCY_GRAPH_INCLUDE_PROJECTS: "^:(?!(buildSrc|test|check)).*"

jobs:
  dependency-submission:
    if: github.repository == 'fluxo-kt/fluxo-io'
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true
          validate-wrappers: true

      - name: Submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
