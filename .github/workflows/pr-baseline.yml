name: PR Deps Baseline

# Manually refresh dependency-update PR baselines from a trusted workflow run.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to amend
        required: true
        type: string

permissions:
  contents: write
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

jobs:
  pr-deps:
    runs-on: ubuntu-24.04
    concurrency:
      group: '${{ github.workflow }}-${{ inputs.pr_number }}'
      cancel-in-progress: true
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PR_NUMBER: ${{ inputs.pr_number }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Confirm start in the comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: Number(process.env.PR_NUMBER),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔄 Baseline update [started](${RUN_URL})...`
            })

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Needed for correct git commit --amend.
          fetch-depth: 3

      - name: Checkout PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          head_owner="$(gh pr view "$PR_NUMBER" --json headRepositoryOwner -q .headRepositoryOwner.login)"
          if [ "$head_owner" != "$GITHUB_REPOSITORY_OWNER" ]; then
            echo "Baseline auto-amend only supports same-repository PR branches."
            exit 1
          fi
          gh pr checkout "$PR_NUMBER"
          echo "GITHUB_HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)" >> "$GITHUB_ENV"
          echo "GITHUB_HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)" >> "$GITHUB_ENV"

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true
          cache-read-only: true
          validate-wrappers: true

      - name: Update baseline
        run: ./updateBaseline

      - name: Verify amended baseline
        run: ./gradlew apiCheck check --no-configuration-cache --stacktrace

      - name: Setup GIT
        run: |
          # Set GIT user email and name to match author of the last commit.
          #git config --local user.name "$(git log --pretty=format:'%an' -1)"
          #git config --local user.email "$(git log --pretty='%ae' -1)"
          git config --local user.name "Baseline Action"
          git config --local user.email "baseline.action@fluxo.local"

          # Create SSH key
          #mkdir -p ~/.ssh/
          #echo "${{ secrets.BOT_GIT_SSH_KEY }}" > ~/.ssh/id_rsa_bot
          #chmod 666 ~/.ssh/id_rsa_bot

          # Configure GH commit signing key.
          # TODO: Fix it, doesn't work atm. Fails for SSH key saved and used this way.
          #git config --local commit.gpgsign true
          #git config --local gpg.format ssh
          #git config --local user.signingkey ~/.ssh/id_rsa

      - name: GIT add
        run: |
          git add -v .

      - name: Commit amend and push
        run: |
          if [ -n "$(git diff --name-only --cached)" ]; then
            # Show what's available.
            git log -n 3 --pretty=format:"%h - %an, %ar : %s"

            # Amend the baseline changes to the last commit.
            git commit --amend --no-edit -vv

            # Show what we are about to push.
            git log -n 3 --pretty=format:"%h - %an, %ar : %s"

            # Push changes back to branch
            git push --force-with-lease="refs/heads/${GITHUB_HEAD_REF}:${GITHUB_HEAD_SHA}" \
              -v origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
          else
            echo "No changes needed."
          fi

      # Track result in the comment
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: Number(process.env.PR_NUMBER), owner: context.repo.owner, repo: context.repo.repo,
              body: `✅ Baseline [updated](${RUN_URL}).`
            })
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: Number(process.env.PR_NUMBER), owner: context.repo.owner, repo: context.repo.repo,
              body: `❌ Baseline update [failed](${RUN_URL})!`
            })
