name: PR Fast-Forward Merge

on:
  issue_comment:
    types: [ created ]

permissions:
  contents: write
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

jobs:
  pr-fast-forward:
    # Only run if the PR comment is an exact fast-forward command.
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/ff' || github.event.comment.body == '/fast-forward')
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Authorize command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          permission="$(gh api "repos/$GITHUB_REPOSITORY/collaborators/$COMMENT_AUTHOR/permission" --jq .permission)"
          case "$permission" in
            admin|maintain|write) ;;
            *)
              echo "::error::$COMMENT_AUTHOR has '$permission' permission, not write/maintain/admin."
              exit 1
              ;;
          esac

      - name: React to the comment right away
        uses: dkershner6/reaction-action@97ede302a1b145b3739dec3ca84a489a34ef48b5 # v2
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reaction: "rocket"

      - name: Fast-forward and push
        uses: sequoia-pgp/fast-forward@ea7628bedcb0b0b96e94383ada458d812fca4979 # v1.0.0
        with:
          merge: true
          # To reduce the workflow's verbosity, use 'on-error'
          # to only post a comment when an error occurs, or 'never' to
          # never post a comment.
          # (Information is always available in the step's summary.)
          comment: always
